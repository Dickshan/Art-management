version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: theartz
      POSTGRES_USER: theartz
      POSTGRES_PASSWORD: theartz_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
  redisdata:
